    const timerDefaults = { focus: 25 * 60, shortBreak: 5 * 60, longBreak: 15 * 60, longEvery: 4 };
    let timerState = store.get('focusTimer', { mode: 'focus', remaining: timerDefaults.focus, duration: timerDefaults.focus, running: false, sessions: 0 });
    let timerTick = null;
    let soundEnabled = store.get('soundEnabled', true);
    let audioCtx = null;
    let speedTimeLeft = 60;
    let speedTimerInterval = null;
    let speedCurrentIndex = 0;
    let speedCorrect = 0;
    let speedWrong = 0;
    let speedAnswered = 0;
    let speedQuestions = [];
    let speedRunning = false;
    let speedGameTimeLeft = 60;
    let speedGameTimer = null;
    let speedGameQuestions = [];
    let speedGameIndex = 0;
    let speedGameCorrect = 0;
    let speedGameWrong = 0;
    let speedGameAnswered = 0;
    let speedGameRunning = false;

    function init() {
      if (store.get('theme', 'light') === 'dark') document.documentElement.classList.add('dark');
      routeFromHash();
      renderNav();
      renderAll();
      wireEvents();
      hydrateTimer();
      renderTimerUI();
      setTimeout(() => $('loader').style.display = 'none', 700);
    }

    function wireEvents() {
      $('menuBtn').onclick = () => $('sidebar').classList.toggle('-translate-x-full');
      $('themeToggle').onclick = () => {
        document.documentElement.classList.toggle('dark');
        store.set('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        $('themeToggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
      };
      $('backTop').onclick = () => scrollTo({ top: 0, behavior: 'smooth' });
      addEventListener('scroll', () => $('backTop').classList.toggle('hidden', scrollY < 420));
      addEventListener('hashchange', routeFromHash);
      $('soundToggle').onclick = () => toggleSound();
    }

    function renderNav() {
      const hash = location.hash.replace('#', '');
      const groups = [
        { id: 'dashboard', icon: '🏠', label: 'Dashboard', page: 'dashboard' },
        { id: 'notes', icon: '📖', label: 'Catatan', page: 'notes', items: chapters.map(c => ({ label: `BAB ${c.id}: ${c.title.replace('GDPR, UU PDP, Privasi & Keamanan Informasi','GDPR & UU PDP')}`, action: `go('notes','bab-${c.id}')`, active: hash === `catatan-bab-${c.id}` })) },
        { id: 'quiz', icon: '🧠', label: 'Quiz', page: 'quiz', items: [
          ...['bab1','bab2','bab3','bab4','bab4b','bab5','bab6','bab7'].map(bab => ({ label: `Quiz ${formatBabName(bab)}`, action: `goQuizChapter('${bab}')`, attrs: `data-page="quiz" data-bab="${bab}"`, active: hash === quizHashFromChapter(bab) })),
          { label: '⚡ Speed Quiz 1 Menit', action: 'goSpeedQuiz()', attrs: 'data-page="quiz" data-quiz-speed="true"', active: hash === 'quiz-speed' }
        ] },
        { id: 'cases', icon: '💡', label: 'Study Case', page: 'cases', items: cases.map((c,i) => ({ label: ['Cambridge Analytica','AI Bias Rekrutmen','Deepfake & Disinformasi','Kebocoran Data','Pinjol Ilegal'][i] || c[0], action: `go('cases','case-${i + 1}')`, active: hash === `study-case-case-${i + 1}` })) },
        { id: 'game', icon: '🎮', label: 'Game', page: 'game', items: [
          { label: 'Drag & Drop Etika', action: `go('game','kategori-etika')`, active: hash === 'game-kategori-etika' },
          { label: 'Tebak Istilah', action: `go('game','tebak-istilah')`, active: hash === 'game-tebak-istilah' },
          { label: 'Decision Game', action: `go('game','decision-game')`, active: hash === 'game-decision-game' },
          { label: '⚡ Speed Challenge 1 Menit', action: `go('game','speed-challenge')`, active: hash === 'game-speed-challenge' }
        ] },
        { id: 'summary', icon: '📊', label: 'Rangkuman', page: 'summary', items: [
          { label: 'Rangkuman BAB 1–3', action: `go('summary','bab-1-3')`, active: hash === 'rangkuman-bab-1-3' },
          { label: 'Rangkuman BAB 4–5', action: `go('summary','bab-4-5')`, active: hash === 'rangkuman-bab-4-5' },
          { label: 'Rangkuman BAB 6–7', action: `go('summary','bab-6-7')`, active: hash === 'rangkuman-bab-6-7' }
        ] }
      ];
      $('navLinks').innerHTML = groups.map(group => {
        const hasItems = !!group.items?.length;
        const isOpen = openMenus.includes(group.id);
        const active = group.page === state.page;
        return `<div class="space-y-1">
          <button class="nav-link ${active ? 'active' : ''} flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:bg-white/70 dark:text-slate-200 dark:hover:bg-white/10" onclick="${hasItems ? `toggleMenu('${group.id}')` : `go('${group.page}')`}">
            <span>${group.icon}</span><span class="min-w-0 flex-1 truncate">${group.label}</span>${hasItems ? `<span class="transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}">⌄</span>` : ''}
          </button>
          ${hasItems ? `<div class="ml-5 overflow-hidden border-l border-indigo-200/70 pl-3 transition-all duration-300 ease-out dark:border-white/10 ${isOpen ? 'max-h-[32rem] opacity-100' : 'max-h-0 opacity-0'}">
            <div class="grid gap-1 py-1">
              ${group.items.map(item => `<button ${item.attrs || ''} class="rounded-xl px-3 py-2 text-left text-xs font-bold leading-5 transition hover:bg-indigo-50 hover:text-indigo-700 dark:hover:bg-white/10 dark:hover:text-cyan-200 ${item.active ? 'bg-cyan-100 text-cyan-800 dark:bg-cyan-400/15 dark:text-cyan-200' : 'text-slate-500 dark:text-slate-400'}" onclick="${item.action}">${item.label}</button>`).join('')}
            </div>
          </div>` : ''}
        </div>`;
      }).join('');
    }

    function toggleMenu(id) {
      openMenus = openMenus.includes(id) ? openMenus.filter(x => x !== id) : [...openMenus, id];
      store.set('openMenus', openMenus);
      renderNav();
    }

    function ensureMenuOpen(id) {
      if (!openMenus.includes(id)) {
        openMenus = [...openMenus, id];
        store.set('openMenus', openMenus);
      }
    }

    function formatBabName(bab) {
      return ({ bab1: 'BAB 1', bab2: 'BAB 2', bab3: 'BAB 3', bab4: 'BAB 4', bab4b: 'BAB 4B', bab5: 'BAB 5', bab6: 'BAB 6', bab7: 'BAB 7' })[bab] || bab;
    }

    function formatLevelName(level) {
      return ({ easy: 'Easy', medium: 'Medium', hard: 'Hard', studyCase: 'Study Case' })[level] || level;
    }

    function normalizeQuizChapter(value = 'bab1') {
      const raw = String(value).replace(/^quiz-bab-/, '').replace(/^bab-/, '').replace(/^bab/, '');
      return raw === '4b' ? 'bab4b' : `bab${raw || 1}`;
    }

    function quizHashFromChapter(chapter) {
      const bab = normalizeQuizChapter(chapter);
      return `quiz-${bab.replace('bab', 'bab-')}`;
    }

    function stopSpeedQuiz() {
      clearInterval(speedTimerInterval);
      speedTimerInterval = null;
      speedRunning = false;
    }

    function goQuizChapter(chapter) {
      stopSpeedQuiz();
      state.quizView = 'standard';
      state.quizChapter = normalizeQuizChapter(chapter);
      state.quizIndex = 0;
      state.quizScore = 0;
      state.quizAnswered = false;
      go('quiz', state.quizChapter.replace('bab', 'bab-'));
      renderQuiz();
    }

    function goSpeedQuiz() {
      state.quizView = 'speed';
      state.quizIndex = 0;
      state.quizScore = 0;
      state.quizAnswered = false;
      location.hash = 'quiz-speed';
      go('quiz', 'speed');
      renderQuiz();
    }

    function routeFromHash() {
      const hash = location.hash.replace('#', '');
      if (!hash) { state.page = 'dashboard'; return; }
      if (hash.startsWith('catatan')) state.page = 'notes';
      else if (hash.startsWith('quiz')) state.page = 'quiz';
      else if (hash.startsWith('study-case')) state.page = 'cases';
      else if (hash.startsWith('game')) state.page = 'game';
      else if (hash.startsWith('rangkuman')) state.page = 'summary';
      else state.page = hash.split('-')[0] || 'dashboard';
      if (state.page !== 'quiz') stopSpeedQuiz();
      if (state.page === 'catatan') state.page = 'notes';
      if (state.page === 'study') state.page = 'cases';
      if (hash === 'quiz-speed') {
        state.quizView = 'speed';
      } else if (hash.startsWith('quiz-bab-')) {
        state.quizView = 'standard';
        state.quizChapter = normalizeQuizChapter(hash);
        state.quizIndex = 0;
        state.quizScore = 0;
        state.quizAnswered = false;
      }
      if (hash.includes('easy')) state.quizMode = 'easy';
      if (hash.includes('medium')) state.quizMode = 'medium';
      if (hash.includes('hard')) state.quizMode = 'hard';
      if (hash.startsWith('quiz-study-case')) state.quizMode = 'studyCase';
      if (state.page !== 'dashboard') ensureMenuOpen(state.page);
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const el = $(state.page) || $('dashboard');
      el.classList.add('active');
      const meta = pages.find(p => p[0] === state.page) || pages[0];
      $('breadcrumb').textContent = `Ethicompedia / ${meta[2]}`;
      $('pageTitle').textContent = meta[2] === 'Dashboard' ? 'Dashboard Belajar' : meta[2];
      if (state.page === 'quiz' && $('quiz')) renderQuiz();
      renderNav();
      setTimeout(() => {
        const cleanAnchor = hash
          .replace('catatan-', '')
          .replace('study-case-', '')
          .replace('game-', '')
          .replace('rangkuman-', '')
          .replace('quiz-', '');
        const target = document.querySelector(`[data-anchor="${cleanAnchor}"]`) || document.querySelector(`[data-anchor="${hash}"]`);
        target?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 120);
    }

    function go(page, anchor = '') {
      if (page !== 'quiz') stopSpeedQuiz();
      state.page = page;
      store.set('lastPage', page);
      if (page !== 'dashboard') ensureMenuOpen(page);
      const hashMap = { dashboard: 'dashboard', notes: 'catatan', quiz: 'quiz', cases: 'study-case', game: 'game', summary: 'rangkuman' };
      location.hash = anchor ? `${hashMap[page]}-${anchor}` : hashMap[page];
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      $(page).classList.add('active');
      const meta = pages.find(p => p[0] === page);
      $('breadcrumb').textContent = `Ethicompedia / ${meta[2]}`;
      $('pageTitle').textContent = meta[2] === 'Dashboard' ? 'Dashboard Belajar' : meta[2];
      if (page === 'quiz') renderQuiz();
      $('sidebar').classList.add('-translate-x-full');
      renderNav();
      scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderAll() {
      renderDashboard();
      renderNotes();
      renderQuiz();
      renderCases();
      renderGame();
      renderSummary();
      updateProgressUI();
    }

    function chapterProgress() { return store.get('chapterProgress', {}); }
    function setChapterDone(id) {
      const p = chapterProgress(); p[id] = 100; store.set('chapterProgress', p); updateProgressUI(); renderDashboard();
      toast(`BAB ${id} ditandai selesai. Mantap, progresmu tersimpan.`);
      playTone('ok');
    }
    function readSectionId(chapterId, subIndex) {
      return `bab${chapterId}-sub${subIndex}`;
    }
    function readSections() {
      return store.get('readSections', []);
    }
    function isSubDone(chapterId, subIndex) {
      const key = `${chapterId}-${subIndex}`;
      return !!store.get('subProgress', {})[key] || readSections().includes(readSectionId(chapterId, subIndex));
    }
    function readButtonHtml(chapterId, subIndex) {
      const sectionId = readSectionId(chapterId, subIndex);
      const done = isSubDone(chapterId, subIndex);
      const cls = done
        ? 'bg-gray-300 text-gray-700 dark:bg-gray-700 dark:text-gray-300 cursor-default'
        : 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white hover:shadow-lg hover:-translate-y-0.5';
      return `<button data-read-id="${sectionId}" onclick="setSubDone('${chapterId}',${subIndex})" ${done ? 'disabled' : ''} class="mt-3 rounded-xl px-3 py-2 text-xs font-bold transition ${cls}">${done ? '✓ Sudah Dibaca' : 'Tandai Sudah Dibaca'}</button>`;
    }
    function updateReadButton(sectionId) {
      const button = document.querySelector(`[data-read-id="${sectionId}"]`);
      if (!button) return;
      button.textContent = '✓ Sudah Dibaca';
      button.disabled = true;
      button.className = 'mt-3 rounded-xl px-3 py-2 text-xs font-bold transition bg-gray-300 text-gray-700 dark:bg-gray-700 dark:text-gray-300 cursor-default';
    }
    function setSubDone(chapterId, subIndex) {
      const key = `${chapterId}-${subIndex}`;
      const sectionId = readSectionId(chapterId, subIndex);
      const done = store.get('subProgress', {});
      const wasDone = !!done[key] || readSections().includes(sectionId);
      done[key] = true;
      store.set('subProgress', done);
      const read = readSections();
      if (!read.includes(sectionId)) {
        read.push(sectionId);
        store.set('readSections', read);
      }
      const total = chapters.find(c => String(c.id) === String(chapterId)).sections.length;
      const count = Object.keys(done).filter(k => k.startsWith(`${chapterId}-`)).length;
      const p = chapterProgress();
      p[chapterId] = Math.min(100, Math.round((count / total) * 100));
      store.set('chapterProgress', p);
      store.set('lastChapter', chapterId);
      updateReadButton(sectionId);
      updateProgressUI();
      renderDashboard();
      if (!wasDone) {
        toast(`Sub-bab selesai dibaca. Progress BAB ${chapterId}: ${p[chapterId]}%.`);
        playTone('ok');
      }
    }
    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.remove('hidden');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.add('hidden'), 2600);
    }

    function ensureAudio() {
      if (!soundEnabled) return null;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(type = 'ok') {
      const ctx = ensureAudio();
      if (!ctx) return;
      const now = ctx.currentTime;
      const patterns = {
        ok: [660, 820],
        bad: [240, 180],
        done: [523, 659, 784],
        rest: [392, 523],
        game: [523, 659, 880]
      };
      (patterns[type] || patterns.ok).forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now + i * 0.11);
        gain.gain.exponentialRampToValueAtTime(0.055, now + i * 0.11 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.11 + 0.13);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i * 0.11);
        osc.stop(now + i * 0.11 + 0.15);
      });
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      store.set('soundEnabled', soundEnabled);
      if (soundEnabled) playTone('ok');
      renderTimerUI();
      toast(`Sound ${soundEnabled ? 'ON' : 'OFF'}`);
    }
    function avgProgress() {
      const p = chapterProgress();
      return Math.round(chapters.reduce((sum, c) => sum + (p[c.id] || 0), 0) / chapters.length);
    }
    function updateProgressUI() {
      const avg = avgProgress();
      $('sidebarProgress').style.width = `${avg}%`;
      $('sidebarProgressText').textContent = `${avg}% selesai`;
      if ($('topProgress')) $('topProgress').style.width = `${avg}%`;
      if ($('topProgressText')) $('topProgressText').textContent = `${avg}%`;
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function timerStats() {
      const all = store.get('timerStats', {});
      return all[todayKey()] || { focusSessions: 0, focusMinutes: 0, breakMinutes: 0 };
    }

    function saveTimerStats(stats) {
      const all = store.get('timerStats', {});
      all[todayKey()] = stats;
      store.set('timerStats', all);
    }

    function saveTimerState() {
      timerState.updatedAt = Date.now();
      store.set('focusTimer', timerState);
    }

    function hydrateTimer() {
      if (timerState.running && timerState.updatedAt) {
        const elapsed = Math.floor((Date.now() - timerState.updatedAt) / 1000);
        timerState.remaining = Math.max(0, timerState.remaining - elapsed);
      }
      if (timerState.running && timerState.remaining <= 0) completeTimerSegment(true);
      else if (timerState.running) startTimer(false);
    }

    function formatTime(sec) {
      const m = Math.floor(Math.max(0, sec) / 60).toString().padStart(2, '0');
      const s = Math.floor(Math.max(0, sec) % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function timerModeLabel() {
      return timerState.mode === 'focus' ? 'Sedang Belajar' : (timerState.mode === 'longBreak' ? 'Istirahat Panjang' : 'Waktu Istirahat');
    }

    function timerMessage() {
      if (timerState.mode === 'focus') return 'Fokus dulu, semangat belajar!';
      if (timerState.mode === 'longBreak') return 'Ambil jeda panjang, isi ulang energi.';
      return 'Waktunya istirahat sebentar.';
    }

    function renderTimerUI() {
      const pct = Math.round(((timerState.duration - timerState.remaining) / timerState.duration) * 100);
      const stats = timerStats();
      if ($('topTimer')) {
        $('topTimer').textContent = `${timerState.mode === 'focus' ? 'Fokus' : 'Break'} ${formatTime(timerState.remaining)}`;
        $('topTimer').className = `hidden rounded-2xl px-3 py-2 text-xs font-bold shadow-sm sm:block ${timerState.mode === 'focus' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-400/15 dark:text-indigo-200' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-400/15 dark:text-emerald-200'}`;
      }
      if ($('soundToggle')) $('soundToggle').textContent = `Sound ${soundEnabled ? 'ON' : 'OFF'}`;
      if (!$('timerCard')) return;
      $('timerCard').innerHTML = `
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-bold uppercase text-indigo-600 dark:text-cyan-300">Focus Timer</p>
            <h3 id="timerMode" class="font-heading text-2xl">${timerModeLabel()}</h3>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">${timerMessage()}</p>
          </div>
          <span class="rounded-full px-3 py-1 text-xs font-black ${timerState.mode === 'focus' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-400/15 dark:text-indigo-200' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-400/15 dark:text-emerald-200'}">${timerState.running ? 'RUNNING' : 'PAUSED'}</span>
        </div>
        <div class="mt-5 text-center">
          <div class="mx-auto grid h-36 w-36 place-items-center rounded-full bg-gradient-to-br ${timerState.mode === 'focus' ? 'from-indigo-600 to-cyan-500' : 'from-emerald-500 to-cyan-400'} p-2 ${timerState.running ? 'animate-pulse' : ''}">
            <div class="grid h-full w-full place-items-center rounded-full bg-white/90 dark:bg-slate-950/90">
              <span id="timerDisplay" class="font-heading text-4xl text-slate-900 dark:text-white">${formatTime(timerState.remaining)}</span>
            </div>
          </div>
          <div class="mt-5 h-3 rounded-full bg-slate-200 dark:bg-white/10"><div id="timerProgress" class="h-3 rounded-full bg-gradient-to-r ${timerState.mode === 'focus' ? 'from-indigo-500 to-cyan-400' : 'from-emerald-400 to-cyan-400'}" style="width:${pct}%"></div></div>
        </div>
        <div class="mt-5 grid grid-cols-2 gap-2 sm:grid-cols-6">
          <button onclick="startTimer()" class="rounded-2xl bg-indigo-600 px-3 py-2 text-sm font-bold text-white">Start</button>
          <button onclick="pauseTimer()" class="rounded-2xl bg-white/75 px-3 py-2 text-sm font-bold text-indigo-700 dark:bg-white/10 dark:text-cyan-200">Pause</button>
          <button onclick="resetTimer()" class="rounded-2xl bg-white/75 px-3 py-2 text-sm font-bold text-indigo-700 dark:bg-white/10 dark:text-cyan-200">Reset</button>
          <button onclick="skipToBreak(true)" class="rounded-2xl bg-emerald-500 px-3 py-2 text-sm font-bold text-white">Istirahat</button>
          <button onclick="continueFocus(true)" class="rounded-2xl bg-amber-400 px-3 py-2 text-sm font-bold text-slate-900">Lanjut</button>
          <button onclick="toggleSound()" class="rounded-2xl bg-white/75 px-3 py-2 text-sm font-bold text-indigo-700 dark:bg-white/10 dark:text-cyan-200">Sound ${soundEnabled ? 'ON' : 'OFF'}</button>
        </div>
        <div class="mt-5 grid grid-cols-3 gap-2 text-center text-xs">
          <div class="rounded-2xl bg-white/70 p-3 dark:bg-white/10"><b class="block text-lg">${stats.focusSessions}</b>Sesi fokus</div>
          <div class="rounded-2xl bg-white/70 p-3 dark:bg-white/10"><b class="block text-lg">${stats.focusMinutes}</b>Menit belajar</div>
          <div class="rounded-2xl bg-white/70 p-3 dark:bg-white/10"><b class="block text-lg">${stats.breakMinutes}</b>Menit istirahat</div>
        </div>`;
    }

    function startTimer(userAction = true) {
      if (timerState.running && timerTick) return;
      if (userAction) ensureAudio();
      timerState.running = true;
      saveTimerState();
      clearInterval(timerTick);
      timerTick = setInterval(() => {
        if (!timerState.running) return;
        if (timerState.remaining > 0) timerState.remaining -= 1;
        if (timerState.remaining <= 0) {
          completeTimerSegment();
          return;
        }
        saveTimerState();
        renderTimerUI();
      }, 1000);
      renderTimerUI();
    }

    function pauseTimer() {
      timerState.running = false;
      clearInterval(timerTick);
      timerTick = null;
      saveTimerState();
      renderTimerUI();
    }

    function resetTimer() {
      pauseTimer();
      timerState.remaining = timerState.duration;
      saveTimerState();
      renderTimerUI();
    }

    function setTimerMode(mode, autoStart = false) {
      clearInterval(timerTick);
      timerTick = null;
      const duration = mode === 'focus' ? timerDefaults.focus : (mode === 'longBreak' ? timerDefaults.longBreak : timerDefaults.shortBreak);
      timerState = { ...timerState, mode, duration, remaining: duration, running: false };
      saveTimerState();
      renderTimerUI();
      if (autoStart) startTimer(false);
    }

    function skipToBreak(autoStart = false) {
      setTimerMode('shortBreak', autoStart);
      toast('Waktunya istirahat sebentar.');
      playTone('rest');
    }

    function continueFocus(autoStart = false) {
      setTimerMode('focus', autoStart);
      toast('Istirahat selesai, yuk lanjut belajar.');
      playTone('done');
    }

    function completeTimerSegment(fromHydrate = false) {
      clearInterval(timerTick);
      timerTick = null;
      const stats = timerStats();
      if (timerState.mode === 'focus') {
        stats.focusSessions += 1;
        stats.focusMinutes += Math.round(timerState.duration / 60);
        timerState.sessions = (timerState.sessions || 0) + 1;
        saveTimerStats(stats);
        const long = timerState.sessions % timerDefaults.longEvery === 0;
        setTimerMode(long ? 'longBreak' : 'shortBreak', true);
        toast(long ? 'Waktu belajar selesai, saatnya istirahat panjang!' : 'Waktu belajar selesai, saatnya istirahat!');
        playTone('done');

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareSpeedQuestion(q) {
      const options = shuffleArray(q.options.map((text, index) => ({ text, correct: index === q.answer })));
      return { ...q, options: options.map(o => o.text), answer: options.findIndex(o => o.correct) };
    }

    const speedGameData = speedQuizData;

    function prepareSpeedGameQuestion(q) {
      return prepareSpeedQuestion(q);
    }

      const best = store.get('speedQuizBest', { correct: 0, answered: 0, accuracy: 0, score: 0 });
      $('quiz').innerHTML = `
        <div class="${card('overflow-hidden')}">
          <div class="rounded-3xl bg-gradient-to-br from-indigo-600 via-purple-600 to-cyan-500 p-6 text-white">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

              <div class="rounded-3xl bg-white/70 p-5 shadow-sm dark:bg-white/10">

                <div id="speedTimer" class="mt-2 font-heading text-6xl text-slate-900 dark:text-white">${formatTime(speedTimeLeft)}</div>
                <div class="mt-4 h-3 rounded-full bg-slate-200 dark:bg-white/10"><div id="speedProgress" class="h-3 rounded-full bg-gradient-to-r from-amber-400 via-cyan-400 to-emerald-400" style="width:${Math.max(0, speedTimeLeft / 60 * 100)}%"></div></div>
                <div class="mt-5 grid grid-cols-3 gap-2 text-center text-sm">
                  <div class="rounded-2xl bg-emerald-100 p-3 font-bold text-emerald-800 dark:bg-emerald-400/15 dark:text-emerald-100">Benar<br><span id="speedCorrect">${speedCorrect}</span></div>
                  <div class="rounded-2xl bg-rose-100 p-3 font-bold text-rose-800 dark:bg-rose-400/15 dark:text-rose-100">Salah<br><span id="speedWrong">${speedWrong}</span></div>
                  <div class="rounded-2xl bg-indigo-100 p-3 font-bold text-indigo-800 dark:bg-indigo-400/15 dark:text-indigo-100">Dijawab<br><span id="speedAnswered">${speedAnswered}</span></div>

                <button onclick="goQuizChapter(state.quizChapter)" class="mt-3 w-full rounded-2xl bg-white/75 px-5 py-3 font-bold text-indigo-700 transition hover:-translate-y-1 dark:bg-white/10 dark:text-cyan-200">Kembali ke Quiz BAB</button>
              </div>
              <div id="speedQuizArea" class="rounded-3xl bg-white/70 p-5 shadow-sm dark:bg-white/10">
                <div id="speedQuizResult"></div>
                <div id="speedQuestionWrap">
                  <div id="speedBabLabel" class="mb-3 inline-flex rounded-full bg-cyan-100 px-3 py-1 text-xs font-black text-cyan-800 dark:bg-cyan-400/15 dark:text-cyan-200">Siap mulai</div>
                  <h3 id="speedQuestion" class="font-heading text-2xl">Tekan tombol Mulai Speed Quiz untuk memulai timer 01:00.</h3>
                  <div id="speedOptions" class="mt-5 grid gap-3"></div>
                </div>
              </div>
            </div>
          </div>
        </div>`;
      updateSpeedTimerDisplay();
      updateSpeedStats();
      if (speedRunning) renderSpeedQuestion();

    function startSpeedQuiz() {
      ensureAudio();
      clearInterval(speedTimerInterval);
      state.quizView = 'speed';
      speedTimeLeft = 60;
      speedCurrentIndex = 0;
      speedCorrect = 0;
      speedWrong = 0;
      speedAnswered = 0;
      speedRunning = true;
      speedQuestions = shuffleArray(speedQuizData).map(prepareSpeedQuestion);
      renderSpeedQuiz();
      renderSpeedQuestion();
      speedTimerInterval = setInterval(() => {
        speedTimeLeft = Math.max(0, speedTimeLeft - 1);
        updateSpeedTimerDisplay();
        if (speedTimeLeft <= 0) endSpeedQuiz();
      }, 1000);
    }

    function updateSpeedTimerDisplay() {
      if ($('speedTimer')) $('speedTimer').textContent = formatTime(speedTimeLeft);
      if ($('speedProgress')) $('speedProgress').style.width = `${Math.max(0, speedTimeLeft / 60 * 100)}%`;
    }

    function updateSpeedStats() {
      if ($('speedCorrect')) $('speedCorrect').textContent = speedCorrect;
      if ($('speedWrong')) $('speedWrong').textContent = speedWrong;
      if ($('speedAnswered')) $('speedAnswered').textContent = speedAnswered;
    }

    function renderSpeedQuestion() {
      if (!speedRunning) return;
      if (speedCurrentIndex >= speedQuestions.length) return endSpeedQuiz();
      const q = speedQuestions[speedCurrentIndex];
      if ($('speedQuizResult')) $('speedQuizResult').innerHTML = '';
      if ($('speedBabLabel')) $('speedBabLabel').textContent = q.bab;
      if ($('speedQuestion')) $('speedQuestion').textContent = q.question;
      if ($('speedOptions')) $('speedOptions').innerHTML = q.options.map((option, index) => `<button class="speed-option rounded-2xl bg-white p-4 text-left font-semibold text-slate-800 shadow-sm transition hover:-translate-y-1 hover:shadow-lg dark:bg-slate-900 dark:text-white" onclick="answerSpeedQuestion(${index})"><span class="mr-2 font-heading">${'ABCD'[index]}.</span>${option}</button>`).join('');
    }

    function answerSpeedQuestion(selectedIndex) {
      if (!speedRunning || speedTimeLeft <= 0) return;
      const q = speedQuestions[speedCurrentIndex];
      if (selectedIndex === q.answer) {
        speedCorrect++;
        playTone('ok');
      } else {
        speedWrong++;
        playTone('bad');
      }
      speedAnswered++;
      speedCurrentIndex++;
      updateSpeedStats();
      renderSpeedQuestion();
    }

    function endSpeedQuiz() {
      clearInterval(speedTimerInterval);
      speedTimerInterval = null;
      if (!speedRunning && !$('speedQuizResult')) return;
      speedRunning = false;
      updateSpeedTimerDisplay();
      document.querySelectorAll('.speed-option').forEach(btn => btn.disabled = true);
      const accuracy = speedAnswered ? Math.round((speedCorrect / speedAnswered) * 100) : 0;
      const score = speedCorrect * 10 - speedWrong * 2;
      const motivation = getSpeedMotivation(accuracy, speedAnswered);
      saveSpeedQuizScore(speedCorrect, speedAnswered, accuracy, score);
      playTone('done');
      toast('Speed Quiz selesai. Cek hasilmu!');
      if ($('speedQuestionWrap')) $('speedQuestionWrap').classList.add('hidden');
      if ($('speedQuizResult')) $('speedQuizResult').innerHTML = `

    function getSpeedMotivation(accuracy, answered) {
      if (answered >= 20 && accuracy >= 80) return 'Keren banget! Kamu cepat dan akurat.';
      if (answered >= 12 && accuracy >= 60) return 'Bagus! Kecepatanmu sudah oke, tinggal tingkatkan akurasi.';
      if (answered < 8) return 'Coba lagi ya. Fokus ke konsep penting dulu biar lebih cepat menjawab.';
      return 'Lumayan! Ulangi lagi untuk meningkatkan skor dan pemahaman.';
    }

    function saveSpeedQuizScore(correct, answered, accuracy, score) {
      const best = store.get('speedQuizBest', { correct: 0, answered: 0, accuracy: 0, score: 0 });

        store.set('speedQuizBest', { correct, answered, accuracy, score, updatedAt: new Date().toISOString() });

    function quizSet() {
      return (quizData[state.quizMode]?.[state.quizChapter] || []).map((q, i) => ({
        ...q,
        ...rotateQuizOptions(q, i),
        no: i + 1,
        chapter: state.quizChapter,
        question: q.scenario ? `${q.scenario} ${q.question}` : q.question
      }));
    }
    function rotateQuizOptions(q, i) {
      const options = q.options || [];
      if (!options.length) return { options, answer: q.answer };
      const seed = state.quizMode.length + state.quizChapter.length + i;
      const shift = seed % options.length;
      const rotated = options.map((text, idx) => ({ text, correct: idx === q.answer })).slice(shift).concat(options.map((text, idx) => ({ text, correct: idx === q.answer })).slice(0, shift));
      return { options: rotated.map(item => item.text), answer: rotated.findIndex(item => item.correct) };
    }
    function selectQuiz(mode) {
      stopSpeedQuiz();
      state.quizView = 'standard';
      state.quizMode = mode;
      state.quizIndex = 0; state.quizScore = 0; state.quizAnswered = false;
      renderQuiz();
    }
    function selectQuizChapter(chapter) {
      stopSpeedQuiz();
      state.quizView = 'standard';
      state.quizChapter = chapter;
      state.quizIndex = 0; state.quizScore = 0; state.quizAnswered = false;
      location.hash = `quiz-${chapter.replace('bab','bab-')}`;
      renderQuiz();
      renderNav();
    }
    function drawQuizQuestion() {
      const set = quizSet();
      if (state.quizIndex >= set.length) return drawQuizResult(set.length);
      const q = set[state.quizIndex];
      $('quizBox').innerHTML = `<div class="${card()}">
        <div class="mb-4 flex items-center justify-between gap-3">
          <span class="font-bold text-indigo-600 dark:text-cyan-300">Soal ${state.quizIndex + 1} dari ${set.length}</span>
          <span class="rounded-full bg-emerald-100 px-3 py-1 text-sm font-bold text-emerald-700 dark:bg-emerald-400/15 dark:text-emerald-200">Skor ${state.quizScore}</span>
        </div>
        <div class="mb-5 h-2 rounded-full bg-slate-200 dark:bg-white/10"><div class="h-2 rounded-full bg-gradient-to-r from-indigo-500 to-cyan-400" style="width:${(state.quizIndex / set.length) * 100}%"></div></div>
        <h3 class="font-heading text-2xl">${q.no}. ${q.question}</h3>
        <div id="options" class="mt-5 grid gap-3">${q.options.map((o,i) => `<button class="option-card rounded-2xl bg-white/75 p-4 text-left font-semibold transition hover:-translate-y-1 hover:shadow-lg dark:bg-white/10" onclick="answerQuiz(${i})"><span class="mr-2 font-heading">${'ABCD'[i]}.</span>${o}</button>`).join('')}</div>
        <div id="feedback" class="mt-5 hidden rounded-2xl p-4"></div>
        <button id="nextBtn" class="mt-5 rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 px-5 py-3 font-bold text-white opacity-50" disabled onclick="nextQuiz()">${state.quizIndex === set.length - 1 ? 'Lihat Hasil' : 'Soal Berikutnya'}</button>
      </div>`;
    }
    function answerQuiz(i) {
      if (state.quizAnswered) return;
      const q = quizSet()[state.quizIndex];
      state.quizAnswered = true;
      const ok = i === q.answer;
      if (ok) state.quizScore++;
      toast(ok ? 'Jawaban benar. +1 poin!' : 'Belum tepat. Cek penjelasannya dulu.');
      playTone(ok ? 'ok' : 'bad');
      document.querySelectorAll('.option-card').forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.answer) btn.classList.add('bg-emerald-100','text-emerald-800','bounce-ok');
        if (idx === i && !ok) btn.classList.add('bg-rose-100','text-rose-800','shake-bad');
      });
      $('feedback').className = `mt-5 rounded-2xl p-4 ${ok ? 'bg-emerald-100 text-emerald-900 dark:bg-emerald-400/15 dark:text-emerald-100' : 'bg-rose-100 text-rose-900 dark:bg-rose-400/15 dark:text-rose-100'}`;
      $('feedback').innerHTML = `<p class="font-heading">${ok ? 'Benar!' : 'Belum tepat.'}</p><p class="mt-1 text-sm">Jawaban benar: <b>${'ABCD'[q.answer]}. ${q.options[q.answer]}</b></p><p class="mt-2 text-sm">${q.explanation}</p>`;
      $('feedback').classList.remove('hidden');
      $('nextBtn').disabled = false; $('nextBtn').classList.remove('opacity-50');
    }
    function nextQuiz() { state.quizIndex++; state.quizAnswered = false; drawQuizQuestion(); }
    function drawQuizResult(total) {
      const pct = Math.round((state.quizScore / total) * 100);
      const wrong = total - state.quizScore;
      const grade = pct >= 85 ? 'A' : pct >= 70 ? 'B' : pct >= 55 ? 'C' : 'D';
      const msg = pct >= 85 ? 'Kuat sekali. Kamu sudah membaca pola etisnya.' : pct >= 70 ? 'Bagus. Tinggal rapikan konsep yang masih kabur.' : pct >= 55 ? 'Lumayan. Ulangi bab yang skornya goyah.' : 'Mulai lagi pelan-pelan. Materinya memang padat, tapi bisa dikuasai.';
      const review = pct >= 85 ? 'Pembahasan singkat: pertahankan cara baca berbasis konsep, terutama hubungan antara etika, data, dan tanggung jawab.' : pct >= 70 ? 'Pembahasan singkat: cek lagi soal yang salah dan bandingkan opsi yang mirip, biasanya jebakannya ada pada prinsip yang tertukar.' : 'Pembahasan singkat: ulangi highlight WAJIB INGAT di catatan, lalu coba mode Easy atau Medium sebelum naik level.';
      const stats = store.get('quizStats', {});
      const key = `${state.quizChapter}-${state.quizMode}`;
      stats.byMode = stats.byMode || {};
      stats.byMode[key] = { score: state.quizScore, total, pct, grade, updatedAt: new Date().toISOString() };
      stats.best = Math.max(stats.best || 0, state.quizScore);
      stats.last = { chapter: state.quizChapter, mode: state.quizMode, score: state.quizScore, total, pct, grade };
      store.set('quizStats', stats); updateProgressUI(); renderDashboard();
      $('quizBox').innerHTML = `<div class="${card('text-center')}">
        <div class="mx-auto grid h-24 w-24 place-items-center rounded-full bg-gradient-to-br from-indigo-600 to-cyan-500 font-heading text-5xl text-white">${grade}</div>
        <h3 class="mt-5 font-heading text-3xl">Skor ${state.quizScore}/${total}</h3>
        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <div class="rounded-2xl bg-emerald-100 p-4 font-bold text-emerald-800 dark:bg-emerald-400/15 dark:text-emerald-100">Benar: ${state.quizScore}</div>
          <div class="rounded-2xl bg-rose-100 p-4 font-bold text-rose-800 dark:bg-rose-400/15 dark:text-rose-100">Salah: ${wrong}</div>
        </div>
        <p class="mt-2 text-slate-600 dark:text-slate-300">${msg}</p>
        <p class="mx-auto mt-3 max-w-2xl rounded-2xl bg-amber-100 p-4 text-sm font-semibold text-amber-950 dark:bg-amber-300/15 dark:text-amber-100">${review}</p>
        <div class="mt-6 flex flex-wrap justify-center gap-3">
          <button onclick="selectQuiz('${state.quizMode}')" class="rounded-2xl bg-indigo-600 px-5 py-3 font-bold text-white">Coba Lagi</button>
          <button onclick="showAllAnswers()" class="rounded-2xl bg-white/75 px-5 py-3 font-bold text-indigo-700 dark:bg-white/10 dark:text-cyan-200">Lihat Semua Jawaban</button>
        </div>
        <div id="allAnswers" class="mt-5 hidden text-left"></div>
      </div>`;
    }
    function showAllAnswers() {
      $('allAnswers').classList.toggle('hidden');

    function renderCases() {

            <div class="grid h-16 w-16 shrink-0 place-items-center rounded-2xl bg-gradient-to-br from-indigo-600 to-cyan-500 text-2xl text-white">${i+1}</div>

        </div>
      </details>`).join('')}</div>`;

    function renderGame() {
      const best = store.get('speedGameBest', { correct: 0, answered: 0, accuracy: 0, score: 0 });
      $('game').innerHTML = `
      <div class="${card()}"><p class="font-bold text-indigo-600 dark:text-cyan-300">🎮 Mini-game edukatif</p><h2 class="font-heading text-3xl">Belajar sambil bermain</h2></div>
      <div class="mt-5 grid gap-5 xl:grid-cols-3">

            <div class="mt-5 grid grid-cols-3 gap-2 text-center text-sm">
              <div class="rounded-2xl bg-emerald-100 p-3 font-bold text-emerald-800 dark:bg-emerald-400/15 dark:text-emerald-100">Benar<br><span id="speedGameCorrect">${speedGameCorrect}</span></div>
              <div class="rounded-2xl bg-rose-100 p-3 font-bold text-rose-800 dark:bg-rose-400/15 dark:text-rose-100">Salah<br><span id="speedGameWrong">${speedGameWrong}</span></div>
              <div class="rounded-2xl bg-indigo-100 p-3 font-bold text-indigo-800 dark:bg-indigo-400/15 dark:text-indigo-100">Dijawab<br><span id="speedGameAnswered">${speedGameAnswered}</span></div>
            </div>
            <button onclick="startSpeedGame()" class="mt-5 w-full rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 px-5 py-3 font-bold text-white transition hover:-translate-y-1 hover:shadow-lg">${speedGameRunning ? 'Restart Game' : 'Mulai Game'}</button>

    const categoryItems = [

    let categoryIndex = 0, categoryScore = 0;

        <div id="categoryFeedback" class="mt-3"></div>
      </div>`;

    const termItems = [
      ['Prinsip keamanan: tidak ada akses dipercaya otomatis.', 'Zero Trust', ['Zero Trust','GDPR','Deepfake']],
      ['Dokumentasi perjalanan bukti digital sampai pengadilan.', 'Chain of Custody', ['Kill Chain','Chain of Custody','Data minimisation']],
      ['Hak meminta penghapusan data pribadi.', 'Right to be Forgotten', ['Purpose Limitation','Right to be Forgotten','Whaling']],
      ['Konten palsu realistis berbasis AI.', 'Deepfake', ['Deepfake','Phishing','Firewall']]
    ];
    let termIndex = 0, termScore = 0;
    function drawTermGame() {
      const item = termItems[termIndex % termItems.length];
      $('termGame').innerHTML = `<div class="rounded-2xl bg-white/70 p-4 dark:bg-white/10">

        <div id="termFeedback" class="mt-3"></div>
      </div>`;
    }
    function answerTerm(choice) {
      const item = termItems[termIndex % termItems.length];
      const ok = choice === item[1];

    function startSpeedGame() {
      ensureAudio();
      clearInterval(speedGameTimer);
      speedGameTimeLeft = 60;
      speedGameIndex = 0;
      speedGameCorrect = 0;
      speedGameWrong = 0;
      speedGameAnswered = 0;
      speedGameRunning = true;
      speedGameQuestions = shuffleArray(speedGameData).map(prepareSpeedGameQuestion);
      if (!$('speedGameCard')) renderGame();
      if ($('speedGameResult')) $('speedGameResult').innerHTML = '';
      if ($('speedGameQuestionWrap')) $('speedGameQuestionWrap').classList.remove('hidden');
      updateSpeedGameStats();
      updateSpeedGameTimer();
      renderSpeedGameQuestion();
      speedGameTimer = setInterval(() => {
        speedGameTimeLeft = Math.max(0, speedGameTimeLeft - 1);
        updateSpeedGameTimer();
        if (speedGameTimeLeft <= 0) endSpeedGame();
      }, 1000);
    }

    function updateSpeedGameTimer() {
      if ($('speedGameTimer')) $('speedGameTimer').textContent = formatTime(speedGameTimeLeft);
      if ($('speedGameProgress')) $('speedGameProgress').style.width = `${Math.max(0, speedGameTimeLeft / 60 * 100)}%`;
    }

    function updateSpeedGameStats() {
      if ($('speedGameCorrect')) $('speedGameCorrect').textContent = speedGameCorrect;
      if ($('speedGameWrong')) $('speedGameWrong').textContent = speedGameWrong;
      if ($('speedGameAnswered')) $('speedGameAnswered').textContent = speedGameAnswered;
    }

    function renderSpeedGameQuestion() {
      if (!speedGameRunning) return;
      if (speedGameIndex >= speedGameQuestions.length) return endSpeedGame();
      const current = speedGameQuestions[speedGameIndex];
      if ($('speedGameResult')) $('speedGameResult').innerHTML = '';
      if ($('speedGameBab')) $('speedGameBab').textContent = current.bab;
      if ($('speedGameQuestion')) $('speedGameQuestion').textContent = current.question;

    }

    function answerSpeedGame(selectedIndex) {
      if (!speedGameRunning || speedGameTimeLeft <= 0) return;
      const current = speedGameQuestions[speedGameIndex];
      if (selectedIndex === current.answer) {
        speedGameCorrect++;
        playTone('ok');
      } else {
        speedGameWrong++;
        playTone('bad');
      }
      speedGameAnswered++;
      speedGameIndex++;
      updateSpeedGameStats();
      renderSpeedGameQuestion();
    }

      clearInterval(speedGameTimer);

      <div class="mt-5 ${card()}"><h3 class="font-heading text-2xl">Timeline Cepat</h3><div class="mt-5 grid gap-3 md:grid-cols-3">${['Teknologi muncul cepat','Risiko etika terlihat','Hukum dan tata kelola mengejar'].map((t,i)=>`<div class="rounded-2xl bg-white/70 p-4 dark:bg-white/10"><div class="mb-2 grid h-8 w-8 place-items-center rounded-full bg-indigo-600 text-sm font-bold text-white">${i+1}</div><p class="font-semibold">${t}</p></div>`).join('')}</div></div>`;
    }

    init();
  </script>
